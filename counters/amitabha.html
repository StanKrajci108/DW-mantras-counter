<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Amitabha</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #ffffff;
      height: 100dvh;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      font-family: "Montserrat", sans-serif, Georgia, serif;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      font-size: 21px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8b6f5e;
    }

    .back-btn {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .image-area {
      width: 100%;
      max-width: 200px;
      display: flex;
      border-radius: 25px;
      box-shadow:  #928e8c 0px 5px 25px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      margin: 0 auto;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0rem 1.5rem 4.5rem;
      gap: 1.5rem;
    }

    .total-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .total-label {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #b4a899;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .total-number {
      font-size: 52px;
      font-weight: 400;
      color: #7c7877;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      animation: fadeIn 5s ease forwards;
    }

    .progress-wrap {
      width: 80%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

       /* ---- Electric burst for the bar ---- */
    @keyframes barElectricity {
      0%   {
        box-shadow: 0 0 6px rgba(139,111,94,0.555), inset 0 1px 1px rgba(255,255,255,0.25);
        filter: brightness(1);
      }

      /* ⚡ Burst */
      1%   {
        box-shadow: 0 0 10px rgb(112, 213, 231), 0 0 20px rgba(18, 172, 192, 0.6), inset 0 1px 1px rgba(255,255,255,0.4);
        filter: brightness(1.4);
      }
      2%   {
        box-shadow: 0 0 6px rgba(139,111,94,0.555), inset 0 1px 1px rgba(255,255,255,0.25);
        filter: brightness(0.85);
      }
      3%   {
        box-shadow: 0 0 2px 15px rgb(255, 156, 255), 0 0 35px rgba(172, 4, 107, 0.7), 0 0 60px rgba(160,110,80,0.4);
        filter: brightness(1.6);
      }
      4%   {
        box-shadow: 0 0 4px rgba(139,111,94,0.3);
        filter: brightness(0.8);
      }
      5%   {
        box-shadow: 0 0 18px rgb(94, 245, 232), 0 0 40px rgba(2, 219, 201, 0.8);
        filter: brightness(1.5);
      }
      7%   {
        box-shadow: 0 0 6px rgba(139,111,94,0.555), inset 0 1px 1px rgba(255,255,255,0.25);
        filter: brightness(1);
      }

      /* 😴 Calm for the rest */
      100% {
        box-shadow: 0 0 6px rgba(139,111,94,0.555), inset 0 1px 1px rgba(255,255,255,0.25);
        filter: brightness(1);
      }
    }

    /* ---- Spark that runs along the bar ---- */
    @keyframes spark {
      0%   { left: -10%; opacity: 0; }
      1%   { left: -10%; opacity: 1; }       /* appear at start of burst */
      6%   { left: 110%; opacity: 0.6; }     /* race to the right end */
      7%   { left: 110%; opacity: 0; }       /* fade out */
      100% { left: 110%; opacity: 0; }       /* stay hidden until next loop */
    }

    .progress-track {
      width: 100%;
      height: 10px; /* thicker */
      background: linear-gradient(to bottom, #e6ded4, #d6ccbf);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.205);
    }

    .progress-fill {
  height: 100%;
  position: relative;
  background: linear-gradient(to left, #f1e9e5 0%, #c0a795 50%, #6e5648 100%);
  border-radius: 6px;
  width: 0%;
  transition: width 0.4s ease;
  box-shadow:
    0 0 6px rgba(139, 111, 94, 0.555),
    inset 0 1px 1px rgba(255,255,255,0.25);

  /* ⚡ Add this — same 4s delay so it starts after the number fade-in */
  animation: barElectricity 7s 4s linear infinite;
}

.progress-fill::before {
  content: "";
  position: absolute;
  top: 0;
  left: -10%;
  width: 18px;
  height: 100%;
  background: linear-gradient(
    to right,
    transparent 0%,
    rgba(255, 230, 200, 0.9) 50%,
    transparent 100%
  );
  filter: blur(3px);
  border-radius: 6px;
  pointer-events: none;

  /* ⚡ Spark races across during the burst */
  animation: spark 7s 4s linear infinite;
}

.progress-fill::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.45) 0%,
    rgba(255,255,255,0.15) 40%,
    rgba(255,255,255,0) 100%
  );
  pointer-events: none;
}

    .progress-labels {
      display: flex;
      justify-content: space-between;
    }

    .progress-labels span {
      font-size: 12px;
      color: #b5a899;
      letter-spacing: 0.04em;
    }

    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .counter-btn {
      width: 90px;
      height: 70px;
      border-radius: 14px;
      border: none;
      background: #fffaf8;
      color: #837e76;
      font-family: "Montserrat", sans-serif;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 2px 4px rgba(139, 111, 94, 0.15), 0 6px 16px rgba(139, 111, 94, 0.108), 0 8px 24px rgba(139, 111, 94, 0.18);
    }

    .counter-btn:active {
      transform: scale(0.94) translateY(2px);
      box-shadow: 0 1px 3px rgba(139,111,94,0.18), 0 3px 8px rgba(139,111,94,0.2), inset 0 2px 6px rgba(0,0,0,0.18);
    }

    .counter-btn:disabled {
      background: #d4c9bf;
      cursor: default;
      box-shadow: none;
      transform: none;
    }

    .small-btn {
      width: 80px;
      height: 50px;
      font-size: 12px;
    }

    .done-msg {
      display: none;
      font-size: 17px;
      color: #8b6f5e;
      text-align: center;
    }

    .corner-btn {
      position: absolute;
      bottom: 2rem;
      background: transparent;
      border: none;
      color: #b4a899;
    }

    .btn-minus { left: 1.5rem; }
    .btn-reset { right: 1.5rem; }

    .last-added {
      position: absolute;
      bottom: 0.3rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #b4a899;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-input {
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid #ddd5c8;
      font-size: 18px;
      text-align: center;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
    }

    .modal-btn {
      flex: 1;
      padding: 0.85rem;
      border-radius: 12px;
      border: none;
    }

    .modal-cancel { background: #f0ebe7; }
    .modal-confirm { background: #d41f1f; color: white; }
  </style>

</head>

<body>

<a class="back-btn" href="../index.html">
  <img src="img-counters/home.png" style="width:28px; opacity:0.7;">
</a> 

<div class="content">
  <h1>Limitless light</h1>
  <div class="image-area">
    <img src="img-counters/Amitabha.jpg" alt="Amitabha">
  </div>

   <div class="total-block">
    <p class="total-number" id="total">0</p>
    <p class="total-label">mantras</p>
   </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-labels">
      <span id="malas-label">0 malas / 0%</span>
      <span>goal: 500,000</span>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="counter-btn" onclick="addMala()">108</button>
    <button class="counter-btn small-btn" onclick="addCustom()">add any amount</button>
    <p class="done-msg" id="done-msg">500,000 reached</p>
  </div>

 
</div>

<button class="corner-btn btn-minus" onclick="subtractMala()">−108</button> 
<button class="corner-btn btn-reset" onclick="resetCounter()">Reset</button>
<p class="last-added" id="last-added"></p>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <p id="modal-text">Enter amount</p>
    <input id="modal-input" type="number" class="modal-input">
    <div class="modal-buttons">
      <button class="modal-btn modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-confirm" onclick="confirmAction()">OK</button>
    </div>
  </div>
</div>

<script>
const GOAL = 500000;
const STEP = 108;
const STORAGE_KEY = 'counter-total-amitabha';

let total = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
let modalMode = null;

function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate(30);
  }
}

function getMalas() {
  return Math.floor(total / STEP);
}

function updateUI() {
  document.getElementById('total').textContent = total.toLocaleString();
  document.getElementById('malas-label').textContent = 
  getMalas() + ' malas / ' + Math.round((total / GOAL) * 100) + '%';
  document.getElementById('progress-fill').style.width =
    Math.round((total / GOAL) * 100) + '%';

  document.getElementById('done-msg').style.display =
    total >= GOAL ? 'block' : 'none';
  const lastDate = localStorage.getItem(STORAGE_KEY + '-date');
const lastAmount = localStorage.getItem(STORAGE_KEY + '-lastamount');
document.getElementById('last-added').textContent =
  lastDate ? 'last: ' + lastDate + ' / ' + lastAmount : '';
}

function saveDate(amount) {
  const today = new Date();
  const dateStr = today.getDate() + '.' + (today.getMonth() + 1) + '.' + today.getFullYear();
  const existingDate = localStorage.getItem(STORAGE_KEY + '-date');
  const existingAmount = parseInt(localStorage.getItem(STORAGE_KEY + '-lastamount')) || 0;
  const newAmount = existingDate === dateStr ? existingAmount + amount : amount;
  localStorage.setItem(STORAGE_KEY + '-date', dateStr);
  localStorage.setItem(STORAGE_KEY + '-lastamount', newAmount);
}

function addMala() {
  vibrate();
  total += STEP;
  saveDate(STEP);
  save();
}

function subtractMala() {
  vibrate();
  total = Math.max(0, total - STEP);
  save();
}

function addCustom() {
  vibrate();
  modalMode = 'add';
  document.getElementById('modal-text').textContent = 'Add amount of mantras / repetitions';
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-input').style.display = 'block';
  openModal();
}

function resetCounter() {
  vibrate();
  modalMode = 'reset';
  document.getElementById('modal-text').textContent = 'Reset counter?';
  document.getElementById('modal-input').style.display = 'none';
  openModal();
}

function confirmAction() {
  let value = parseInt(document.getElementById('modal-input').value);

  if (modalMode !== 'reset' && (isNaN(value) || value < 0)) return;

  if (modalMode === 'add') {
  total += value;
  saveDate(value);
}
  if (modalMode === 'reset') total = 0;

  save();
  closeModal();
}

function save() {
  localStorage.setItem(STORAGE_KEY, total);
  updateUI();
}

function openModal() {
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

updateUI();
</script>

</body>
</html>
